kind = "web"
previewPath = "/"
title = "Real-Chat"
version = "1.0.0"
id = "artifacts/chat-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/", "/ws" ]
localPort = 5173

[services.development]
run = "pnpm --filter @workspace/chat-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chat-app", "run", "build" ]
publicDir = "artifacts/chat-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
